<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Study Recommendation</title>

<style>

body{

    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:40px;

}

.container{

    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);

}

h1{

    text-align:center;
    color:#2c3e50;

}

.box{

    margin-top:20px;
    background:#f8f9fa;
    padding:20px;
    border-left:5px solid #28a745;
    white-space:pre-wrap;
    line-height:1.8;
    border-radius:8px;

}

.buttons{

    margin-top:30px;
    text-align:center;

}

.buttons a{

    display:inline-block;
    margin:10px;
    padding:12px 22px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-weight:bold;

}

.pdf{
    background:#28a745;
}

.notes{
    background:#007BFF;
}

.dashboard{
    background:#6c757d;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 AI Study Recommendation</h1>

<hr>

<h2>📄 {{ note.original_filename }}</h2>

<div class="box">

{{ note.recommendation }}

</div>

<div class="buttons">

<a class="pdf"
href="{{ url_for('pdf.download_recommendation', note_id=note.id) }}">

📥 Download PDF

</a>

<a class="notes"
href="{{ url_for('notes.my_notes') }}">

📚 My Notes

</a>

<a class="dashboard"
href="{{ url_for('dashboard.dashboard') }}">

🏠 Dashboard

</a>

</div>

</div>

</body>

</html>
