<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        .navbar{
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        .navbar-brand{
            font-weight:bold;
            font-size:20px;
        }

        .nav-link{
            color:white !important;
            margin-right:10px;
            transition:.3s;
        }

        .nav-link:hover{
            color:#ffd54f !important;
        }

        .nav-link.active{
            color:#ffc107 !important;
            font-weight:bold;
        }

        .user-name{
            color:#ffffff;
            margin-right:15px;
            font-weight:500;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <!-- Logo -->

        <a class="navbar-brand"
           href="{{ url_for('dashboard.dashboard') }}">

            🎓 AI Exam System

        </a>

        <!-- Mobile Toggle -->

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navbar Items -->

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center">

                <!-- Dashboard -->

                <li class="nav-item">

                    <a class="nav-link {% if request.endpoint=='dashboard.dashboard' %}active{% endif %}"
                       href="{{ url_for('dashboard.dashboard') }}">

                        🏠 Dashboard

                    </a>

                </li>

                <!-- Upload -->

                <li class="nav-item">

                    <a class="nav-link {% if request.endpoint=='upload.upload' %}active{% endif %}"
                       href="{{ url_for('upload.upload') }}">

                        📤 Upload Notes

                    </a>

                </li>

                <!-- Notes -->

                <li class="nav-item">

                    <a class="nav-link {% if request.endpoint=='notes.notes' %}active{% endif %}"
                       href="{{ url_for('notes.notes') }}">

                        📚 My Notes

                    </a>

                </li>

                <!-- Results -->

                <li class="nav-item">

                    <a class="nav-link {% if request.endpoint=='result.results' %}active{% endif %}"
                       href="{{ url_for('result.results') }}">

                        📊 Results

                    </a>

                </li>

                <!-- AI Chat -->

                <li class="nav-item">

                    <a class="nav-link {% if request.endpoint=='chatbot.chatbot_page' %}active{% endif %}"
                       href="{{ url_for('chatbot.chatbot_page') }}">

                        🤖 AI Chat

                    </a>

                </li>

                <!-- Logged In User -->

                {% if current_user.is_authenticated %}

                <li class="nav-item">

                    <span class="user-name">

                        👤 {{ current_user.full_name }}

                    </span>

                </li>

                {% endif %}

                <!-- Logout -->

                <li class="nav-item">

                    <a href="{{ url_for('auth.logout') }}"
                       class="btn btn-danger btn-sm">

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
