<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
</head>

<body>

    <h2>Student Registration</h2>

    <form method="POST">

        <label>Full Name</label><br>
        <input
            type="text"
            name="full_name"
            required
        >
        <br><br>

        <label>Email</label><br>
        <input
            type="email"
            name="email"
            required
        >
        <br><br>

        <label>Password</label><br>
        <input
            type="password"
            name="password"
            required
        >
        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="{{ url_for('auth.login') }}">
        Already have an account?
    </a>

</body>

</html>
