<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        #chat-box {
            width: 60%;
            margin: auto;
            height: 400px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 10px;
            background: white;
        }

        .user {
            text-align: right;
            margin: 10px;
            color: blue;
        }

        .bot {
            text-align: left;
            margin: 10px;
            color: green;
        }

        #input-area {
            width: 60%;
            margin: auto;
            display: flex;
            margin-top: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
        }

        #upload-area {
            width: 60%;
            margin: 20px auto;
            text-align: center;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">AI Study Assistant</h2>

<!-- ✅ PDF Upload Section -->
<div id="upload-area">
    <input type="file" id="pdfFile">
    <button onclick="uploadPDF()">Upload PDF</button>
</div>

<!-- ✅ Chat Box -->
<div id="chat-box"></div>

<!-- ✅ Input Area -->
<div id="input-area">
    <input type="text" id="message" placeholder="Ask something from your notes...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
// ==========================================
// 📄 Upload PDF Function (FIXED)
// ==========================================
async function uploadPDF() {
    let fileInput = document.getElementById("pdfFile");
    let file = fileInput.files[0];

    if (!file) {
        alert("Select a PDF first");
        return;
    }

    let formData = new FormData();

    // ✅ FIX HERE (IMPORTANT)
    formData.append("pdf", file);

    let response = await fetch("/upload-pdf", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    if (data.message) {
        alert("✅ PDF uploaded successfully! Now ask questions.");
    } else {
        alert("❌ " + data.error);
    }
}


// ==========================================
// 💬 Send Chat Message
// ==========================================
async function sendMessage() {
    let input = document.getElementById("message");
    let chatBox = document.getElementById("chat-box");

    let message = input.value;

    if (!message) return;

    chatBox.innerHTML += `<div class="user">You: ${message}</div>`;
    chatBox.innerHTML += `<div class="bot" id="typing">Typing...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    input.value = "";

    try {
        let response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        });

        let data = await response.json();

        document.getElementById("typing").remove();

        chatBox.innerHTML += `<div class="bot">AI: ${data.reply}</div>`;

    } catch (error) {
        document.getElementById("typing").remove();
        chatBox.innerHTML += `<div class="bot">❌ Error connecting to server</div>`;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
