<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Summary</title>

<!-- ✅ Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

.card{
    border:none;
    border-radius:12px;
    box-shadow:0px 4px 15px rgba(0,0,0,.08);
}

.summary-box{
    white-space:pre-wrap;
    line-height:1.8;
    font-size:15px;
}

</style>

</head>

<body>

<!-- ✅ USE REUSABLE NAVBAR -->
{% include "navbar.html" %}

<div class="container mt-4">

<h3>📘 AI Generated Summary</h3>

<p class="text-muted">📄 {{ note.original_filename }}</p>

<!-- SUMMARY CARD -->
<div class="card p-4 mt-3">

<div class="summary-box">
{{ note.summary }}
</div>

</div>

<!-- BUTTONS -->
<div class="mt-4">

<a href="{{ url_for('pdf.download_summary', note_id=note.id) }}" class="btn btn-success">
📥 Download PDF
</a>

<a href="{{ url_for('notes.my_notes') }}" class="btn btn-primary">
📚 My Notes
</a>

<a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-secondary">
🏠 Dashboard
</a>

</div>

</div>

</body>
</html>
