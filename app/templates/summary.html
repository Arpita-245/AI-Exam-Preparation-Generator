<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Summary</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            background:#f5f7fa;
        }

        .card{
            border:none;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
        }

        .summary-box{
            white-space:pre-wrap;
            line-height:1.8;
            font-size:16px;
            color:#333;
        }

    </style>

</head>

<body>

    {% include "navbar.html" %}

    <div class="container mt-5">

        <!-- Heading -->
        <div class="mb-4">

            <h2>📘 AI Generated Summary</h2>

            <p class="text-muted">
                <strong>File:</strong>
                {{ note.original_filename }}
            </p>

        </div>

        <!-- Summary Card -->
        <div class="card p-4">

            {% if note.summary %}

                <div class="summary-box">
                    {{ note.summary }}
                </div>

            {% else %}

                <div class="alert alert-warning">

                    Summary not available.

                </div>

            {% endif %}

        </div>

        <!-- Buttons -->
        <div class="mt-4">

            <a
                href="{{ url_for('pdf.download_summary', note_id=note.id) }}"
                class="btn btn-success">

                📥 Download PDF

            </a>

            <a
                href="{{ url_for('notes.notes') }}"
                class="btn btn-primary">

                📚 My Notes

            </a>

            <a
                href="{{ url_for('dashboard.dashboard') }}"
                class="btn btn-secondary">

                🏠 Dashboard

            </a>

        </div>

    </div>

</body>

</html>
